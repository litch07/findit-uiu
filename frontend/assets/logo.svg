<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" id="findit-professional-mark">
  <defs>
    <title>FindIt UIU Professional Logo Mark</title>
  </defs>
  
  <!-- Rotated exactly -45 degrees around the mathematical center to create the magnifying glass angle -->
  <g transform="rotate(-45 50 50)">
    
    <!-- Unified Magnifying Glass Rim & Map Pin Handle -->
    <path 
      d="M 76 38.5 
         A 26 26 0 1 0 24 38.5 
         C 24 56.5 34 72.5 48 86.5 
         A 2.8 2.8 0 0 0 52 86.5 
         C 66 72.5 76 56.5 76 38.5 
         Z 
         M 50 24.5 
         A 14 14 0 1 1 50 52.5 
         A 14 14 0 1 1 50 24.5 
         Z" 
      fill="#D4590A" 
      fill-rule="evenodd" 
    />
    
    <!-- Focus / Location Dot (Represents the found item) -->
    <circle 
      cx="50" 
      cy="38.5" 
      r="5" 
      fill="#1B2A4A" 
    />
    
  </g>
</svg>

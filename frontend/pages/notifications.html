<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Notifications — FindIt UIU</title>
    <link rel="icon" type="image/svg+xml" href="../assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/pages/notifications.css">
</head>
<body>
  <div id="auth-loader" class="hidden">
    <div class="loader-logo">F</div>
    <div class="spinner"></div>
    <p>Verifying session...</p>
  </div>
  <div id="toast-container"></div>

  <nav class="navbar navbar--app">
    <div class="navbar__wrap">
      <a href="home.html" class="navbar__logo">
        <img src="../assets/logo.svg" alt="FindIt UIU Logo" class="navbar__logo-mark">
        <div>
          <div class="navbar__logo-text">FindIt</div>
          <span class="navbar__logo-sub">UIU</span>
        </div>
      </a>
      <div class="nav-links desktop-only">
        <a href="home.html" class="nav-link">Home</a>
        <a href="browse.html" class="nav-link">Browse Items</a>
        <a href="post-report.html" class="nav-link">Post Report</a>
        <a href="my-reports.html" class="nav-link">My Reports</a>
      </div>
      <div class="nav-icons desktop-only">
        <a href="messages.html" class="nav-icon-btn" title="Messages" aria-label="Messages">💬<span class="dot hidden msg-badge"></span></a>
        <a href="notifications.html" class="nav-icon-btn" title="Notifications" aria-label="Notifications">🔔<span class="dot hidden bell-badge"></span></a>
        <div class="nav-avatar-wrap">
          <button class="nav-avatar" id="nav-avatar" aria-label="Open account menu" aria-expanded="false"></button>
          <div class="nav-menu" id="nav-menu">
            <div class="nav-menu__head">
              <div class="nav-menu__avatar"></div>
              <div class="nav-menu__info">
                <div class="nav-menu__name"></div>
                <div class="nav-menu__email"></div>
                <div class="nav-menu__id"></div>
              </div>
            </div>
            <div class="nav-menu__body">
              <div class="nav-menu__section">Account</div>
              <a href="profile.html" class="nav-menu__item">My Profile</a>
              <a href="settings.html" class="nav-menu__item">Settings</a>
              <div class="nav-menu__sep"></div>
              <button class="nav-menu__item nav-menu__item--danger" data-logout="">Sign Out</button>
            </div>
          </div>
        </div>
      </div>
      <button class="nav-hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="nav-mobile" id="nav-mobile">
    <a href="home.html" class="nav-mobile__link">Home</a>
    <a href="browse.html" class="nav-mobile__link">Browse Items</a>
    <a href="post-report.html" class="nav-mobile__link">Post Report</a>
    <a href="my-reports.html" class="nav-mobile__link">My Reports</a>
    <div class="nav-mobile__sep"></div>
    <a href="messages.html" class="nav-mobile__link">Messages</a>
    <a href="notifications.html" class="nav-mobile__link">Notifications</a>
    <a href="profile.html" class="nav-mobile__link">My Profile</a>
    <a href="settings.html" class="nav-mobile__link">Settings</a>
    <div class="nav-mobile__sep"></div>
    <button class="nav-mobile__link nav-mobile__link--danger" data-logout="">Sign Out</button>
  </div>

  <main class="page-offset">
    <div class="bg-white border-b">
      <div class="container page-hdr shared-elem-25">
        <div class="shared-elem-26">
          <div class="shared-elem-17">
            <h2 class="m-0 font-heading shared-elem-27">All Notifications</h2>
            <span id="unread-badge" class="badge-cat shared-elem-28">0 unread</span>
          </div>
          <button id="mark-all-read" class="btn btn-ghost btn-sm">Mark all as read</button>
        </div>
        <div class="filter-tabs shared-elem-29">
          <button class="filter-tab active" type="button" data-filter="all">All</button>
          <button class="filter-tab" type="button" data-filter="approvals">Approvals</button>
          <button class="filter-tab" type="button" data-filter="claim_requests">Claim Requests</button>
          <button class="filter-tab" type="button" data-filter="system">System</button>
        </div>
      </div>
    </div>

    <div class="container shared-elem-15">
      <div id="notif-list"></div>
      <div id="empty-notifs" class="hidden text-center shared-elem-30">
        <div class="shared-elem-31">🔔</div>
        <h3 class="m-0">No notifications found</h3>
        <p class="text-muted mt-2">Try a different filter.</p>
      </div>
      <div id="notif-pagination" class="pagination-wrap"></div>
    </div>
  </main>
  <script src="../js/api.js?v=5"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/utils.js?v=5"></script>
  <script src="../js/navbar.js?v=5"></script>
  <script src="../js/pages/notifications.js?v=5"></script>
  </body></html>

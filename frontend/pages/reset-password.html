<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Set New Password — FindIt UIU</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23D4590A'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='18' fill='white'>🔍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
  <link rel="stylesheet" href="../css/pages/reset-password.css">
</head>

<body>
  <!-- PUBLIC NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="nav-logo-icon">🔍</span>
        <span class="nav-logo-text">FindIt</span>
      </a>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-outline btn-sm">Sign In</a>
        <a href="register.html" class="btn btn-primary btn-sm">Get Started</a>
      </div>
    </div>
  </nav>

  <div id="toast-container"></div>

  <main class="auth-layout">
    <div class="auth-left auth-left--orange">
      <div class="auth-left-content">
        <a href="index.html" class="auth-logo">
          <div class="auth-logo-mark">🔍</div>
          <div>
            <div class="auth-logo-text">FindIt</div>
            <div class="auth-logo-sub">UIU Lost &amp; Found</div>
          </div>
        </a>
        <h2 class="auth-left-title">Secure Your Account</h2>
        <p class="auth-left-desc">Choose a strong, unique password to keep your FindIt account safe.</p>
      </div>

      <div class="auth-decor decor-1"></div>
      <div class="auth-decor decor-2"></div>
      <div class="auth-decor decor-3"></div>
    </div>

    <div class="auth-right">
      <div class="auth-form-wrapper">
        <h2 class="auth-right-title">Set New Password</h2>
        <p class="auth-right-sub">Please enter your new password below.</p>

        <div id="invalid-link-error" class="err-banner hidden reset-error-top">
          <span class="err-icon">❌</span>
          <span class="err-text">Invalid or expired reset link.</span>
        </div>

        <form id="reset-password-form">
          <input type="hidden" id="token" name="token">
          <input type="hidden" id="email" name="email">

          <div class="form-group">
            <label class="form-label" for="password">New Password <span class="req">*</span></label>
            <div class="icon-input">
              <span class="icon">🔒</span>
              <input type="password" id="password" class="form-input" placeholder="At least 8 characters" required="" minlength="8">
              <button type="button" class="eye-btn" aria-label="Toggle password visibility">👁️</button>
            </div>
            <div class="inline-error hidden" id="password-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password_confirmation">Confirm Password <span class="req">*</span></label>
            <div class="icon-input">
              <span class="icon">🔒</span>
              <input type="password" id="password_confirmation" class="form-input" placeholder="Confirm new password" required="" minlength="8">
              <button type="button" class="eye-btn" aria-label="Toggle password visibility">👁️</button>
            </div>
            <div class="inline-error hidden" id="confirm-error"></div>
          </div>

          <div id="form-error" class="err-banner hidden">
            <span class="err-icon">⚠️</span>
            <span class="err-text"></span>
          </div>

          <button type="submit" id="submit-btn" class="btn btn-primary btn-lg btn-full">Reset Password</button>
        </form>
      </div>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/pages/reset-password.js"></script>
</body>

</html>
